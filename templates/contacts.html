<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Контакты</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    .card {
      border: 1px solid gray;
      border-radius: 0.75rem;
      padding: 1.25rem;
    }
    .card-wrap { margin-top: 50px; }
  </style>
</head>
<body>
  <div style="text-align:center;">
    <h1>Контакты</h1>
  </div>
  <div class="container">
    <div class="row">
      <div class="col-12 col-md-2"></div>
      <div class="col-12 col-md-8">
        <div class="row justify-content-center">
          <div class="col-12 col-md-5 card-wrap">
            <div class="card">
              <div class="mb-3">
                <label for="name" class="form-label">Имя</label>
                <textarea class="form-control" id="name" rows="1"></textarea>
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Почта</label>
                <input type="email" class="form-control" id="email" placeholder="name@example.com" />
              </div>
              <div class="mb-3">
                <label for="text" class="form-label">Сообщение</label>
                <textarea class="form-control" id="text" rows="2"></textarea>
              </div>
              <button type="button" class="btn btn-primary" style="width:110px;">Отправить</button>
            </div>
          </div>

          <div class="col-12 col-md-7" style="display:flex; flex-direction:column; padding: 5rem;">
              <h3>Наши контакты</h3>
              <div>
                  <p>Контакты</p>
              </div>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-2"></div>
    </div>
  </div>
</body>
</html>
