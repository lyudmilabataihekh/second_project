<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Контакты</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" />
  <style>
    body {
      margin-left: 200px;
    }

    .card {
      border: 1px solid gray;
      border-radius: 0.75rem;
      padding: 1.25rem;
    }
    .card-wrap { margin-top: 50px; }

    /* Стили для боковой панели */
    .sidebar {
      width: 200px;
      height: 100vh;
      background: #2C2C2C;
      color: white;
      position: fixed;
      display: flex;
      flex-direction: column;
      left: 0;
      top: 0;
      z-index: 1000;
    }
    .sidebar-header {
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid #444;
    }
    .sidebar-header h6 {
      margin: 0;
      font-weight: 600;
    }
    .nav-link {
      padding: 10px 15px;
      color: #ddd;
      text-decoration: none;
      display: flex;
      align-items: center;
    }
    .nav-link:hover {
      background: #0d6efd;
      color: white;
    }
    .nav-link.active {
      background: #0d6efd;
      color: white;
    }
    .nav-link i {
      font-size: 14px;
      margin-right: 10px;
      width: 16px;
      text-align: center;
    }
    .user-section {
      border-top: 1px solid #444;
      padding: 15px 0;
      margin-top: auto;
    }
    .user-dropdown {
      background: none;
      border: none;
      color: white;
      text-align: left;
      padding: 10px 15px;
      display: flex;
      width: 100%;
      align-items: center;
    }
    .user-dropdown i:first-child {
      font-size: 18px;
      margin-right: 10px;
    }
    .user-dropdown .bi-chevron-down {
      margin-left: auto;
      font-size: 12px;
    }
    .dropdown-menu {
      background-color: #3C3C3C;
      border: 1px solid #555;
    }
    .dropdown-item {
      color: #ddd;
      padding: 8px 15px;
      font-size: 14px;
    }
    .dropdown-item:hover {
      background-color: #0d6efd;
      color: white;
    }
    .dropdown-divider {
      border-color: #555;
    }
  </style>
</head>
<body>
  <!-- Боковая панель -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h6>Меню</h6>
    </div>
    <div style="flex: 1" id="menu-root">
      <div style="margin: 8px 0">
        <a href="#" class="nav-link">
          <i class="bi bi-house"></i> Главная
        </a>
      </div>
      <div style="margin: 8px 0">
        <a href="#" class="nav-link">
          <i class="bi bi-grid"></i> Категории
        </a>
      </div>
      <div style="margin: 8px 0">
        <a href="#" class="nav-link">
          <i class="bi bi-cart"></i> Заказы
        </a>
      </div>
      <div style="margin: 8px 0">
        <a href="#" class="nav-link active">
          <i class="bi bi-telephone"></i> Контакты
        </a>
      </div>
    </div>
    <div class="user-section">
      <div class="dropdown w-100" id="user-dropdown">
        <button class="user-dropdown" type="button" data-bs-toggle="dropdown" aria-expanded="false">
          <i class="bi bi-person-circle"></i>
          <span>Пользователь</span>
          <i class="bi bi-chevron-down"></i>
        </button>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item" href="#"><i class="bi bi-person"></i> Профиль</a></li>
          <li><hr class="dropdown-divider" /></li>
          <li><a class="dropdown-item" href="#"><i class="bi bi-box-arrow-right"></i> Выход</a></li>
        </ul>
      </div>
    </div>
  </div>

  <!-- Ваш оригинальный код без изменений -->
  <div style="text-align:center;">
    <h1>Контакты</h1>
  </div>
  <div class="container">
    <div class="row">
      <div class="col-12 col-md-2"></div>
      <div class="col-12 col-md-8">
        <div class="row justify-content-center">
          <div class="col-12 col-md-5 card-wrap">
            <div class="card">
              <div class="mb-3">
                <label for="name" class="form-label">Имя</label>
                <textarea class="form-control" id="name" rows="1"></textarea>
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Почта</label>
                <input type="email" class="form-control" id="email" placeholder="name@example.com" />
              </div>
              <div class="mb-3">
                <label for="text" class="form-label">Сообщение</label>
                <textarea class="form-control" id="text" rows="2"></textarea>
              </div>
              <button type="button" class="btn btn-primary" style="width:110px;">Отправить</button>
            </div>
          </div>

          <div class="col-12 col-md-7" style="display:flex; flex-direction:column; padding: 5rem;">
              <h3>Наши контакты</h3>
              <div>
                  <p>Контакты</p>
              </div>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-2"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
